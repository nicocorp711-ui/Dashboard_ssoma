name: Sync JSON desde Google Drive - SSOMA

on:
  schedule:
    - cron: '0 13 * * *'   # Todos los días a las 8:00 AM hora Lima (UTC-5 = 13:00 UTC)
  workflow_dispatch:         # También permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar IDS_CASMA.json desde Google Drive
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=1zDOWw8Cs7AexDNRVIPnPKTZsAHIQdOV-" -o IDS_CASMA.json
          echo "IDS_CASMA.json descargado"

      - name: Descargar EVENTOS_CASMA.json desde Google Drive
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=1xLOFTfBjOV53PiqiveEQfVSRXCr8L9dc" -o EVENTOS_CASMA.json
          echo "EVENTOS_CASMA.json descargado"

      - name: Descargar IDS_PLANTA.json desde Google Drive
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=1tNm4httR21CYhN0DXWGbHusWsxCTkvhN" -o IDS_PLANTA.json
          echo "IDS_PLANTA.json descargado"

      - name: Verificar JSON válido
        run: |
          python3 -c "import json; json.load(open('IDS_CASMA.json'));    print('✅ IDS_CASMA.json OK')"
          python3 -c "import json; json.load(open('EVENTOS_CASMA.json')); print('✅ EVENTOS_CASMA.json OK')"
          python3 -c "import json; json.load(open('IDS_PLANTA.json'));   print('✅ IDS_PLANTA.json OK')"

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IDS_CASMA.json EVENTOS_CASMA.json IDS_PLANTA.json
          git diff --staged --quiet || git commit -m "Sync SSOMA desde Google Drive - $(date '+%d/%m/%Y %H:%M')"
          git push
